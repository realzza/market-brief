# docker compose up -d         → build (if needed) + run detached
# docker compose logs -f        → tail logs (watch for [scheduler] ticks)
# docker compose down           → stop & remove (data volume survives)
# docker compose down -v        → stop & wipe the SQLite volume too
#
# Fresh-tweet path:
#   The `rsshub` service can scrape live tweets, but only if you provide
#   real Twitter login credentials in .env (see .env.example). Without
#   credentials, rsshub still runs but its Twitter route returns 503, and
#   the app silently falls back to the (stale-for-some-accounts) free
#   syndication endpoint. Adding credentials is opt-in.

services:
  serenity:
    build:
      context: .
      dockerfile: Dockerfile
      # Pin the app to the runner stage. Required now that the Dockerfile has a
      # later `pages-refresh` stage — without this, the build defaults to the
      # final stage and the app container would run the refresh loop instead.
      target: runner
    image: serenity-tracker:latest
    container_name: serenity-tracker
    restart: unless-stopped
    depends_on:
      - rsshub
      - truthsocial

    # Host:container — change PORT_HOST in .env (or export it) if 3737 is
    # taken. The container always listens on 3000 internally.
    ports:
      - "${PORT_HOST:-3737}:3000"

    # Named volume for SQLite. Swap for a bind mount like `./data:/app/data`
    # if you'd rather have the .db file sit in the repo root for backup.
    volumes:
      - serenity-data:/app/data

    # Load secrets from .env at the project root (NOT committed).
    # ANTHROPIC_API_KEY is required; TWITTER_USERNAME defaults to aleabitoreddit.
    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      # Internal DNS — Compose makes rsshub resolvable by service name.
      # If empty, lib/twitter.ts skips the RSSHub path and goes straight to
      # syndication. Set to "" in .env to disable RSSHub even if it's running.
      - RSSHUB_URL=${RSSHUB_URL-http://rsshub:1200}
      # Truth Social fetch sidecar (internal DNS). If empty, lib/truthsocial.ts
      # skips Truth Social entirely and tracked analysts are X-only. Set to ""
      # in .env to disable even when the container is running.
      - TRUTHSOCIAL_URL=${TRUTHSOCIAL_URL-http://truthsocial:8000}

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    # Keep a sensible log footprint so the container doesn't fill the disk
    # over weeks of running.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # pages-refresh — optional sidecar that republishes the static GitHub Pages
  # snapshot from the shared DB every REFRESH_INTERVAL seconds. It reads the
  # same serenity-data volume the app writes, so it picks up new posts/digests
  # without the app being involved (though there's nothing new to publish
  # unless `serenity` is running and fetching). Force-pushes to gh-pages.
  #
  # Opt-in: behind the `pages` profile, so a bare `docker compose up` won't
  # start it. Run it explicitly — `docker compose up -d --build pages-refresh`
  # (pulls in serenity via depends_on) — or `docker compose --profile pages up`.
  #
  # Requires GH_PAGES_TOKEN in .env — a GitHub token with write access to the
  # Pages repo (fine-grained: Contents → Read/Write on realzza/market-brief, or
  # a classic token with `repo`). Without it, every push fails and logs an error.
  pages-refresh:
    profiles: ["pages"]
    build:
      context: .
      dockerfile: Dockerfile
      target: pages-refresh
    image: serenity-pages-refresh:latest
    container_name: serenity-pages-refresh
    restart: unless-stopped
    depends_on:
      - serenity
    # Same DB volume as the app. Read-write because opening a WAL-mode SQLite
    # file (and the idempotent schema-init on connect) needs to touch -wal/-shm.
    volumes:
      - serenity-data:/app/data
    environment:
      - TZ=${TZ:-UTC}
      # Must equal the repo name (project-site base path). See README.
      - PAGES_BASE_PATH=${PAGES_BASE_PATH:-/market-brief}
      # Rebuild cadence in seconds (default 30 min).
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-1800}
      # Tokenized push URL — no .git or keychain in the container. The token
      # comes from .env and is interpolated by Compose at `up` time.
      - PAGES_REMOTE=https://x-access-token:${GH_PAGES_TOKEN}@github.com/${PAGES_REPO:-realzza/market-brief}.git
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # RSSHub — scrapes Twitter/X (and other sources) into RSS/JSON feeds.
  # Internal-only; not exposed to the host. To inspect manually, run
  # `docker compose exec rsshub wget -qO- http://localhost:1200/twitter/user/USER`.
  rsshub:
    image: diygod/rsshub:latest
    container_name: serenity-rsshub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # In-memory cache; RSSHub starts fine without Redis for single-instance use.
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=600          # cache feeds for 10 min
      # Twitter user-timeline scraping requires THREE values (see .env.example
      # for how to obtain each). Leave empty → RSSHub returns 503 and the app
      # silently falls back to syndication.
      - TWITTER_AUTH_TOKEN=${TWITTER_AUTH_TOKEN:-}
      - TWITTER_CONSUMER_KEY=${TWITTER_CONSUMER_KEY:-}
      - TWITTER_CONSUMER_SECRET=${TWITTER_CONSUMER_SECRET:-}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # Truth Social fetch sidecar. Truth Social blocks plain server requests at
  # the Cloudflare TLS-fingerprint layer, so this small Python service uses
  # browser TLS impersonation (curl_cffi) to pull a tracked account's public
  # posts and serves them as JSON on the internal network. No credentials
  # needed for prominent public accounts (e.g. @realDonaldTrump). Internal-only;
  # inspect with `docker compose exec truthsocial python -c "import urllib.request as u; print(u.urlopen('http://localhost:8000/healthz').read())"`.
  truthsocial:
    build:
      context: ./truthsocial-sidecar
      dockerfile: Dockerfile
    image: serenity-truthsocial:latest
    container_name: serenity-truthsocial
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      # Newest-first Chrome TLS impersonation targets; the first that clears
      # Cloudflare wins. Bump if Truth Social's Cloudflare starts blocking.
      - TS_IMPERSONATE=${TS_IMPERSONATE:-chrome146,chrome136,chrome131,chrome124,chrome120}
      - TS_CACHE_TTL=${TS_CACHE_TTL:-300}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  serenity-data:
    name: serenity-tracker-data
